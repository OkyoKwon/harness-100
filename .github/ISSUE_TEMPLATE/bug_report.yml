name: Bug Report / 버그 리포트
description: Report a bug to help us improve / 버그를 신고하여 개선에 도움을 주세요
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below.
        버그를 신고해 주셔서 감사합니다! 아래 양식을 작성해 주세요.

  - type: textarea
    id: description
    attributes:
      label: Description / 설명
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 재현 단계
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 예상 동작
      description: What you expected to happen.
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 실제 동작
      description: What actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / 스크린샷
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser / 브라우저
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / 운영체제
      placeholder: "e.g., macOS 15, Windows 11, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g., 22.x"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 추가 정보
      description: Any other context about the problem.
    validations:
      required: false
